name: MLX TPS Benchmark
on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  benchmark-m1:
    runs-on: macos-latest # This points to Apple Silicon (M1/M2) runners
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MLX LM
        run: |
          python -m pip install --upgrade pip
          pip install mlx-lm

      - name: Run Benchmark
        run: |
          # We use the 4-bit quantized version for maximum throughput
          MODEL="mlx-community/Qwen2.5-0.5B-Instruct-4bit"
          
          echo "### STARTING TPS BENCHMARK ###"
          # -p: Input tokens (Prompt)
          # -g: Output tokens (Generation)
          python -m mlx_lm.benchmark \
            --model $MODEL \
            --prompt-tokens 512 \
            --tokens-to-generate 128
