name: MLX TPS Benchmark
on:
  workflow_dispatch:

jobs:
  benchmark-m1:
    runs-on: macos-latest # Targets M1/M2 Silicon
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MLX LM
        run: |
          python -m pip install --upgrade pip
          pip install mlx-lm

      - name: Run Benchmark
        run: |
          # Standard 0.5B model for speed testing
          MODEL="mlx-community/Qwen2.5-0.5B-Instruct-4bit"
          
          echo "### STARTING TPS BENCHMARK ###"
          # --prompt-tokens: Pre-fill speed (reading input)
          # --generation-tokens: Decoding speed (writing output)
          python -m mlx_lm.benchmark \
            --model $MODEL \
            --prompt-tokens 512 \
            --generation-tokens 128 \
            --num-trials 3
